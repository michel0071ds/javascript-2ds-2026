    <input type="text" id="teste">
    <button onclick="enviar()">Enviar</button>

<script>

    let nome = "";

    let altura = 1.60;
    let estudando = true;

    document.write("<h1>"+nome+"</h1>");
    document.writw("<br>");
    document.writw("<h2>"+idade+"</h2>");
    document.writw("<br>");
    document.writw(altura);
    document.writw("<br>");
    document.writw(estudando);

    let teste = document.getElementById("teste");

    function enviar (){
        document.write(teste)

    }
    

</script>
